<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprout — Custom Cakes</title>
  <style>
    :root {
      --cream: #FDF1DB;
      --sage-tan: #CFC49D;
      --terracotta: #D89684;
      --light-green: #96AB88;
      --mid-green: #597B60;
      --deep-green: #40534D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--deep-green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { max-width: 540px; width: 100%; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 2rem; font-weight: 700; color: var(--deep-green); margin-bottom: 8px; }
    p { color: var(--mid-green); margin-bottom: 32px; line-height: 1.6; }
    .cta {
      display: inline-block;
      background: var(--mid-green);
      color: var(--cream);
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .cta:hover { background: var(--deep-green); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌱</div>
    <h1>Custom Cakes</h1>
    <p>Have a custom cake in mind? Tell us about it and we'll get back to you shortly.</p>
    <a href="/intake/" class="cta">Request a Custom Cake</a>
  </div>
</body>
</html>
